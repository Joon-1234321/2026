<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>듣고 타이핑 - Long i with y</title>
<style>
  :root{
    --bg1:#dbeafe;
    --bg2:#e0f2fe;
    --bg3:#fef3c7;
    --card:#ffffffee;
    --ink:#0f172a;
    --blue:#2563eb;
    --green:#16a34a;
    --red:#dc2626;
    --yellow:#facc15;
    --shadow:0 16px 34px rgba(15,23,42,.16);
    --radius:28px;
  }

*{box-sizing:border-box}

html,body{
margin:0;
padding:0;
min-height:100%;
font-family:"Pretendard","Noto Sans KR",Arial,sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
color:var(--ink);
}

body{
padding:18px;
}

.wrap{
max-width:980px;
margin:0 auto;
}

.screen{
display:none;
}

.screen.active{
display:block;
}

.panel{
background:var(--card);
border-radius:var(--radius);
box-shadow:var(--shadow);
padding:28px;
backdrop-filter:blur(8px);
}

.home{
min-height:78vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

h1{
margin:0 0 12px;
font-size:clamp(2.3rem,5vw,4rem);
font-weight:900;
color:#1d4ed8;
letter-spacing:-.04em;
}

.subtitle{
font-size:clamp(1.1rem,2vw,1.45rem);
line-height:1.7;
margin:0 0 24px;
font-weight:700;
}

.bubbleRow{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:12px;
margin:20px 0 26px;
}

.bubble{
background:#fff;
padding:12px 18px;
border-radius:999px;
font-weight:900;
box-shadow:0 8px 18px rgba(0,0,0,.08);
}

button{
border:none;
border-radius:20px;
padding:16px 24px;
font-size:1.15rem;
font-weight:900;
cursor:pointer;
box-shadow:0 8px 18px rgba(0,0,0,.12);
transition:transform .12s ease, box-shadow .12s ease;
}

button:hover{transform:translateY(-2px)}
button:active{transform:translateY(0)}

.primary{
background:linear-gradient(135deg,#2563eb,#38bdf8);
color:#fff;
}

.green{
background:linear-gradient(135deg,#16a34a,#4ade80);
color:#fff;
}

.ghost{
background:#fff;
color:var(--ink);
}

.topBar{
display:grid;
grid-template-columns:1fr .8fr .8fr;
gap:12px;
margin-bottom:16px;
}

.stat{
background:#fff;
border-radius:20px;
padding:16px;
min-height:72px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:1.15rem;
font-weight:900;
box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.progressBox{
background:#fff;
padding:12px 16px;
border-radius:20px;
margin-bottom:18px;
box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.progressText{
font-weight:900;
text-align:center;
margin-bottom:8px;
}

.progressWrap{
width:100%;
height:24px;
border-radius:999px;
overflow:hidden;
background:#e5e7eb;
}

.progressBar{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#38bdf8,#8b5cf6);
transition:width .25s ease;
}

.gameCard{
background:#ffffffee;
border-radius:30px;
box-shadow:var(--shadow);
padding:28px;
text-align:center;
min-height:520px;
}

.stepBadge{
display:inline-block;
background:#eff6ff;
color:#1d4ed8;
border:3px solid #bfdbfe;
padding:10px 18px;
border-radius:999px;
font-weight:900;
margin-bottom:16px;
}

.listenIcon{
font-size:5rem;
margin:8px 0 12px;
animation:pulse 1.5s ease-in-out infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1)}
50%{transform:scale(1.08)}
}

.instruction{
font-size:clamp(1.2rem,2.2vw,1.6rem);
font-weight:900;
margin:6px 0 20px;
}

.inputBox{
width:min(560px,100%);
font-size:clamp(2rem,5vw,3.5rem);
text-align:center;
padding:18px 22px;
border-radius:24px;
border:4px solid #bfdbfe;
font-weight:900;
outline:none;
color:#0f172a;
background:#fff;
letter-spacing:.05em;
}

.inputBox:focus{
border-color:#2563eb;
box-shadow:0 0 0 5px rgba(37,99,235,.12);
}

.actionRow{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin-top:20px;
}

.feedback{
min-height:48px;
margin-top:18px;
font-size:1.35rem;
font-weight:900;
}

.good{color:var(--green)}
.bad{color:var(--red)}

.answerReveal{
display:none;
margin:20px auto 0;
max-width:560px;
background:#fff7ed;
border:4px solid #fed7aa;
border-radius:24px;
padding:18px;
font-size:1.35rem;
font-weight:900;
}

.answerWord{
display:block;
font-size:clamp(2.2rem,6vw,4rem);
color:#ea580c;
margin-top:8px;
letter-spacing:.05em;
}

.starRain{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
z-index:10;
}

.star{
position:absolute;
top:-30px;
font-size:30px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);opacity:.9}
}

.resultBox{
text-align:center;
padding:40px 24px;
}

.resultScore{
font-size:clamp(2.5rem,7vw,5rem);
font-weight:900;
color:#1d4ed8;
margin:12px 0;
}

.wordList{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin-top:22px;
}

.wordChip{
background:#fff;
border-radius:999px;
padding:10px 16px;
font-weight:900;
box-shadow:0 6px 14px rgba(0,0,0,.08);
}

@media(max-width:700px){
body{padding:12px}
.panel,.gameCard{padding:20px}
.topBar{grid-template-columns:1fr}
.listenIcon{font-size:4rem}
} </style>

</head>
<body>

<div class="wrap">

        <div class="bubbleRow">
          <div class="bubble">🎧 자연 속도 2번 듣기</div>
          <div class="bubble">⌨️ 스펠링 입력</div>
          <div class="bubble">✅ 정답이면 다음 문제</div>
          <div class="bubble">🌟 별 효과</div>

      <div class="stat" id="scoreLabel">점수 0</div>
    </div>

  </section>

  <section class="screen" id="resultScreen">
    <div class="panel resultBox">
      <h1>🎉 수고하셨습니다!</h1>
      <div class="resultScore" id="finalScore">0점</div>
      <p class="subtitle" id="resultMessage">정말 잘했어요.</p>
      <div class="wordList" id="wordList"></div>
      <div class="actionRow">
        <button class="green" onclick="startGame()">다시 하기</button>
        <button class="ghost" onclick="goHome()">처음으로</button>
      </div>
    </div>
  </section>

</div>

<script>
const wordSet = [
  'cry', 'dry', 'sky', 'spy',
  'fly', 'try', 'ply', 'fry',
  'pry', 'sly', 'spry', 'sty'
];

let words = [];
let currentIndex = 0;
let currentWord = '';
let score = 0;
let tries = 0;
let revealed = false;

const homeScreen = document.getElementById('homeScreen');
const gameScreen = document.getElementById('gameScreen');
const resultScreen = document.getElementById('resultScreen');
const roundLabel = document.getElementById('roundLabel');
const tryLabel = document.getElementById('tryLabel');
const scoreLabel = document.getElementById('scoreLabel');
const progressBar = document.getElementById('progressBar');
const answerInput = document.getElementById('answerInput');
const feedback = document.getElementById('feedback');
const answerReveal = document.getElementById('answerReveal');
const answerWord = document.getElementById('answerWord');
const finalScore = document.getElementById('finalScore');
const resultMessage = document.getElementById('resultMessage');
const wordList = document.getElementById('wordList');

function shuffle(arr){
  const copy = [...arr];
  for(let i = copy.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function showScreen(name){
  homeScreen.classList.remove('active');
  gameScreen.classList.remove('active');
  resultScreen.classList.remove('active');
  if(name === 'home') homeScreen.classList.add('active');
  if(name === 'game') gameScreen.classList.add('active');
  if(name === 'result') resultScreen.classList.add('active');
}

function startGame(){
  window.speechSynthesis.cancel();
  words = shuffle(wordSet);
  currentIndex = 0;
  score = 0;
  showScreen('game');
  setupQuestion();
}

function goHome(){
  window.speechSynthesis.cancel();
  showScreen('home');
}

function setupQuestion(){
  if(currentIndex >= words.length){
    finishGame();
    return;
  }

  currentWord = words[currentIndex];
  tries = 0;
  revealed = false;
  answerInput.value = '';
  answerInput.disabled = false;
  feedback.textContent = '';
  feedback.className = 'feedback';
  answerReveal.style.display = 'none';
  answerWord.textContent = currentWord;
  updateStats();

  setTimeout(() => {
    answerInput.focus();
    speakCurrent();
  }, 400);
}

function updateStats(){
  roundLabel.textContent = `${currentIndex + 1} / ${words.length}`;
  tryLabel.textContent = `시도 ${tries} / 3`;
  scoreLabel.textContent = `점수 ${score}`;
  progressBar.style.width = `${(currentIndex / words.length) * 100}%`;
}

function normalize(text){
  return text.trim().toLowerCase();
}

function checkAnswer(){
  const userAnswer = normalize(answerInput.value);
  if(!userAnswer){
    feedback.textContent = '단어를 입력해 주세요.';
    feedback.className = 'feedback bad';
    answerInput.focus();
    return;
  }

  if(userAnswer === currentWord.toLowerCase()){
    const point = revealed ? 5 : Math.max(10 - tries * 2, 6);
    score += point;
    feedback.textContent = `정답! +${point}점`;
    feedback.className = 'feedback good';
    burstStars(22);
    updateStats();
    answerInput.disabled = true;
    setTimeout(() => {
      currentIndex++;
      setupQuestion();
    }, 850);
    return;
  }

  tries++;
  updateStats();

  if(tries >= 3){
    revealed = true;
    answerReveal.style.display = 'block';
    feedback.textContent = '정답을 확인한 뒤, 다시 정확히 입력하세요.';
    feedback.className = 'feedback bad';
    speakCurrent();
  } else {
    feedback.textContent = '다시 들어 보고 입력하세요.';
    feedback.className = 'feedback bad';
    speakCurrent();
  }

  answerInput.select();
}

answerInput.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    e.preventDefault();
    checkAnswer();
  }
});

answerInput.addEventListener('paste', e => e.preventDefault());
answerInput.addEventListener('copy', e => e.preventDefault());
answerInput.addEventListener('cut', e => e.preventDefault());

function finishGame(){
  progressBar.style.width = '100%';
  showScreen('result');
  finalScore.textContent = `${score}점`;

  if(score >= words.length * 9){
    resultMessage.textContent = '완벽해요! 파닉스 스타예요.';
  } else if(score >= words.length * 7){
    resultMessage.textContent = '아주 잘했어요! 한 번 더 하면 더 좋아져요.';
  } else {
    resultMessage.textContent = '끝까지 해낸 것이 훌륭해요. 다시 도전해 보세요.';
  }

  wordList.innerHTML = '';
  wordSet.forEach(w => {
    const chip = document.createElement('div');
    chip.className = 'wordChip';
    chip.textContent = w;
    wordList.appendChild(chip);
  });

  burstStars(45);
}

function getEnglishVoice(){
  const voices = speechSynthesis.getVoices();
  return voices.find(v => /en-US/i.test(v.lang)) || voices.find(v => /^en/i.test(v.lang)) || voices[0];
}

function speakText(text, repeat=2, rate=0.9){
  window.speechSynthesis.cancel();
  const voice = getEnglishVoice();
  let delay = 0;

  for(let i = 0; i < repeat; i++){
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance('\u200B, ' + text);
      u.lang = 'en-US';
      if(voice) u.voice = voice;
      u.rate = rate;
      u.pitch = 1;
      speechSynthesis.speak(u);
    }, delay);
    delay += 1050;
  }
}

function speakCurrent(){
  if(currentWord) speakText(currentWord, 2, 0.88);
}

function burstStars(count=18){
  const rain = document.getElementById('starRain');
  for(let i=0;i<count;i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.textContent = ['⭐','✨','🌟'][Math.floor(Math.random()*3)];
    s.style.left = Math.random()*100 + 'vw';
    s.style.animationDuration = (2 + Math.random()*2.5) + 's';
    s.style.opacity = .75 + Math.random()*.25;
    rain.appendChild(s);
    setTimeout(() => s.remove(), 4600);
  }
}

window.speechSynthesis.onvoiceschanged = () => {};
</script>

</body>
