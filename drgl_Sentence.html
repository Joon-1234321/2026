<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Consonant Blends 문장읽기카드</title>
<style>
*{  box-sizing:border-box;}
body{  margin:0;  font-family:Arial,sans-serif;  background:linear-gradient(135deg,#89f7fe,#66a6ff);  padding:24px;}
.wrap{  max-width:1100px;  margin:auto;}
.header{  background:white;  padding:25px;  border-radius:25px;  text-align:center;  margin-bottom:20px;  box-shadow:0 12px 28px rgba(0,0,0,0.12);}
.title{  font-size:2.2rem;  font-weight:bold;  color:#0f172a;}
.subtitle{  margin-top:8px;  font-size:1.05rem;  color:#475569;}
.controls{  margin-top:15px;}
button{  padding:10px 18px;  margin:5px;  border-radius:12px;  border:none;  color:white;  font-weight:bold;  cursor:pointer;  font-size:1rem;}
.stop{  background:#2563eb;}
.all{  background:#10b981;}
.grid{  display:grid;  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));  gap:15px;}
.card{  background:white;  padding:20px;  border-radius:18px;  cursor:pointer;  box-shadow:0 8px 18px rgba(0,0,0,0.10);  transition:transform 0.12s ease,             box-shadow 0.12s ease;}
.card:hover{  transform:translateY(-2px);  box-shadow:0 12px 24px rgba(0,0,0,0.14);}
.num{  color:#2563eb;  font-weight:bold;  margin-bottom:6px;}
.text{  font-size:1.6rem;  font-weight:bold;  line-height:1.45;  color:#0f172a;}
.hint{  font-size:0.9rem;  color:#666;  margin-top:8px;}
@media (max-width:700px){
  body{    padding:16px;  }
  .title{    font-size:1.8rem;  }
  .text{    font-size:1.35rem;  }}
</style></head>
<body>
<div class="wrap">
<div class="header">
<div class="title">Consonant Blends 문장읽기카드</div>
<div class="subtitle">brick, brown, truck, dress 같은 단어들을 문장 속에서 리드미컬하게 읽어 보세요.</div>
<div class="controls">
<button class="stop"onclick="stopReading()">멈추기</button>
<button class="all"onclick="readAll()">전체 읽기</button>
</div>
</div>
<div class="grid"id="grid"></div>
</div>
<script>
// 요청하신 12개 핵심 단어를 완벽히 녹여내어 새로 빌드한 25개 문장 데이터 리스트
const sentences = [
/* 리듬 문장 (1~5) */
"Brick block, brown bear.", "Crack crown, truck track.", "Drum dress, glass glue.", "Green grapes on the plate.", "A brick, a truck, and a track.",
/* 쉬운 기본 문장 (6~10) */
"The brick wall is strong.", "The cute bear is brown.", "A big truck passed by.", "She wears a pretty dress.", "Fill the glass with water.",
/* 단어 대비 문장 (11~15) */
"A truck is not a track.", "A crown is not a crack.", "Glue is not like glass.", "Green grapes are not brown.", "A drum is not a dress.",
/* 연결 확장 문장 (16~20) */
"I see a brown truck on the track.", "The king wears a gold crown.", "Use the glue to fix the glass.", "There is a crack in the brick.", "We eat green grapes in the yard.",
/* 스토리 문장 (21~25) */
"A big brown truck hits a brick.", "She wears a dress and plays the drum.", "The green grapes fall into the glass.", "Fix the crack in the toy truck with glue.", "The king with a crown walks on the running track."
];

let voice;
let allReadingTimeout = null;
let currentUtterance = null;

function loadVoices(){
  const v = window.speechSynthesis.getVoices();
  voice =
    v.find(x => x.lang === "en-US" && /Google|Microsoft|Samantha|Jenny|Aria|Guy|David/i.test(x.name))
    ||
    v.find(x => x.lang === "en-US")
    ||
    v.find(x => x.lang && x.lang.startsWith("en"))
    ||
    v[0];
}

function speak(text){
  stopReading();
  currentUtterance = new SpeechSynthesisUtterance("\u200B, " + text);
  currentUtterance.lang = "en-US";
  currentUtterance.rate = 0.88;
  currentUtterance.pitch = 1;
  if(voice) currentUtterance.voice = voice;
  speechSynthesis.speak(currentUtterance);
}

function build(){
  const grid = document.getElementById("grid");
  grid.innerHTML = '';
  sentences.forEach((s,i)=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="num">${i+1}.</div>
      <div class="text">${s}</div>
      <div class="hint">클릭해서 듣기</div>
    `;
    card.onclick = ()=>speak(s);
    grid.appendChild(card);
  });
}

function stopReading(){
  speechSynthesis.cancel();
  if(allReadingTimeout) {
    clearTimeout(allReadingTimeout);
    allReadingTimeout = null;
  }
}

function readAll(){
  stopReading();
  let i = 0;
  function next(){
    if(i >= sentences.length) return;
    currentUtterance = new SpeechSynthesisUtterance("\u200B, " + sentences[i]);
    currentUtterance.lang = "en-US";
    currentUtterance.rate = 0.88;
    currentUtterance.pitch = 1;
    if(voice) currentUtterance.voice = voice;
    currentUtterance.onend = ()=>{
      i++;
      allReadingTimeout = setTimeout(next,500);
    };
    currentUtterance.onerror = ()=>{
      i++;
      allReadingTimeout = setTimeout(next,500);
    };
    speechSynthesis.speak(currentUtterance);
  }
  next();
}

window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();
build();
</script>
</body></html>
