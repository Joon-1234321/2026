<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Long Vowel 문장 읽기</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #89f7fe, #66a6ff);
  padding: 24px;
}

.wrap {
  max-width: 1100px;
  margin: auto;
}

.header {
  background: white;
  padding: 25px;
  border-radius: 25px;
  text-align: center;
  margin-bottom: 20px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.12);
}

.title {
  font-size: 2.2rem;
  font-weight: bold;
  color: #0f172a;
}

.subtitle {
  margin-top: 8px;
  font-size: 1.05rem;
  color: #475569;
}

.controls {
  margin-top: 15px;
}

button {
  padding: 10px 18px;
  margin: 5px;
  border-radius: 12px;
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
  font-size: 1rem;
}

.stop { background: #2563eb; }
.all { background: #10b981; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px,1fr));
  gap: 15px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 18px;
  cursor: pointer;
  box-shadow: 0 8px 18px rgba(0,0,0,0.10);
  transition: transform 0.12s ease, box-shadow 0.12s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 24px rgba(0,0,0,0.14);
}

.num {
  color: #2563eb;
  font-weight: bold;
  margin-bottom: 6px;
}

.text {
  font-size: 1.6rem;
  font-weight: bold;
  line-height: 1.45;
  color: #0f172a;
}

.hint {
  font-size: 0.9rem;
  color: #666;
  margin-top: 8px;
}

@media (max-width: 700px) {
  body { padding: 16px; }
  .title { font-size: 1.8rem; }
  .text { font-size: 1.35rem; }
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<div class="title">Long Vowel 문장 읽기</div>
<div class="subtitle">magic e 단어를 문장 속에서 읽어 보세요.</div>
<div class="controls">
<button class="stop" onclick="stop()">멈추기</button>
<button class="all" onclick="readAll()">전체 읽기</button>
</div>
</div>

<div class="grid" id="grid"></div>

</div>

<script>

const sentences = [

/* 리듬 */
"A maze, a name, a cake.",
"A cake by the lake.",
"Nine, lime, kite, five.",
"A cone, a nose, a rose.",
"A cute cube and a tube.",

/* 쉬운 문장 */
"My name is on the cake.",
"The cake is by the lake.",
"I see nine kites.",
"The lime is on the plate.",
"The kite is in the sky.",

/* 대비 */
"A name is not a maze.",
"A cake is not a lake.",
"Nine is not five.",
"A cone is not a nose.",
"A cube is not a tube.",

/* 연결 */
"I have a cake and a lime.",
"June has a cute kite.",
"The rose is at home.",
"A cone is by the lake.",
"The cute cube is in the tube.",

/* 스토리 */
"June has a cake at home.",
"Five kites fly over the lake.",
"A cute rose is in the vase.",
"Nine cubes are in the tube.",
"My name is on the maze."

];

let voice;

function loadVoices(){
  const v = speechSynthesis.getVoices();
  voice =
    v.find(x => x.lang === "en-US" && /Google|Microsoft|Samantha|Jenny|Aria|Guy|David/i.test(x.name)) ||
    v.find(x => x.lang === "en-US") ||
    v.find(x => x.lang && x.lang.startsWith("en")) ||
    v[0];
}

function speak(t){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance("\u200B, " + t);
  u.lang = "en-US";
  u.rate = 0.88;
  u.pitch = 1;
  if(voice) u.voice = voice;
  speechSynthesis.speak(u);
}

function build(){
  const grid = document.getElementById("grid");

  sentences.forEach((s,i)=>{
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="num">${i+1}.</div>
      <div class="text">${s}</div>
      <div class="hint">클릭해서 듣기</div>
    `;

    card.onclick = () => speak(s);

    grid.appendChild(card);
  });
}

function stop(){
  speechSynthesis.cancel();
}

function readAll(){
  let i = 0;

  function next(){
    if(i >= sentences.length) return;

    const u = new SpeechSynthesisUtterance("\u200B, " + sentences[i]);
    u.lang = "en-US";
    u.rate = 0.88;
    u.pitch = 1;
    if(voice) u.voice = voice;

    u.onend = () => {
      i++;
      setTimeout(next, 400);
    };

    speechSynthesis.speak(u);
  }

  speechSynthesis.cancel();
  next();
}

window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();
build();

</script>

</body>
</html>
