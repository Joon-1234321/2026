<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Short a Spelling Test</title>
<style>
:root{
  --bg:#0b1220;
  --panel:#0f1b36cc;
  --text:#e5e7eb;
  --accent:#60a5fa;
  --accent2:#22c55e;
  --ok:#22c55e;
  --no:#ef4444;
  --line:#2b3b63;
  --input:#0b1530;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family: Arial, "Noto Sans KR", sans-serif;
  color:var(--text);
  background:
    radial-gradient(1200px 700px at 50% -10%, #1b2a55 0%, var(--bg) 60%),
    linear-gradient(135deg, #0b1220, #111c35);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.wrap{
  width:100%;
  max-width:760px;
}
.card{
  background:var(--panel);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:28px;
  box-shadow:0 20px 60px rgba(0,0,0,0.35);
  overflow:hidden;
}
.top{
  padding:22px 24px 12px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.mini{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:14px;
  flex-wrap:wrap;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:rgba(96,165,250,0.12);
  border:1px solid rgba(96,165,250,0.25);
  color:#dbeafe;
  padding:8px 14px;
  border-radius:999px;
  font-size:15px;
  font-weight:700;
}
.stage{
  font-size:15px;
  color:#c7d2fe;
  font-weight:700;
}
.progress{
  width:100%;
  height:12px;
  background:rgba(255,255,255,0.08);
  border-radius:999px;
  overflow:hidden;
}
.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg, var(--accent), var(--accent2));
  transition:width .35s ease;
  border-radius:999px;
}
.content{
  padding:28px 24px 30px;
}
.title{
  font-size:34px;
  font-weight:800;
  line-height:1.25;
  margin:0 0 10px;
  text-align:center;
  letter-spacing:-0.3px;
}
.desc{
  text-align:center;
  color:#cbd5e1;
  font-size:18px;
  line-height:1.6;
  margin:0 0 24px;
}
.listen-box{
  display:flex;
  justify-content:center;
  margin:18px 0 22px;
}
.play-btn{
  border:none;
  background:linear-gradient(135deg, #3b82f6, #22c55e);
  color:white;
  font-size:20px;
  font-weight:800;
  padding:18px 28px;
  border-radius:18px;
  cursor:pointer;
  min-width:190px;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
  transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.play-btn:hover{ transform:translateY(-1px); }
.play-btn:active{ transform:translateY(1px); }
.play-btn:disabled{ opacity:.55; cursor:not-allowed; }

.input-wrap{
  max-width:460px;
  margin:0 auto;
}
.input-label{
  display:block;
  margin:0 0 10px;
  font-size:17px;
  font-weight:700;
}
.answer{
  width:100%;
  padding:18px 18px;
  border-radius:18px;
  border:1px solid var(--line);
  background:var(--input);
  color:white;
  font-size:24px;
  font-weight:700;
  outline:none;
  text-align:center;
  transition:border-color .2s ease, box-shadow .2s ease, transform .2s ease;
}
.answer:focus{
  border-color:#60a5fa;
  box-shadow:0 0 0 4px rgba(96,165,250,0.15);
}
.btn-row{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:20px;
}
.check-btn, .restart-btn{
  border:none;
  cursor:pointer;
  font-weight:800;
  border-radius:16px;
  padding:15px 22px;
  font-size:18px;
  transition:transform .12s ease, opacity .12s ease;
}
.check-btn{
  background:#f8fafc;
  color:#0f172a;
  min-width:150px;
}
.restart-btn{
  background:#334155;
  color:#fff;
  min-width:160px;
}
.check-btn:hover, .restart-btn:hover{
  transform:translateY(-1px);
}
.msg{
  margin-top:20px;
  text-align:center;
  min-height:32px;
  font-size:20px;
  font-weight:800;
  letter-spacing:-0.2px;
}
.msg.ok{ color:#86efac; }
.msg.no{ color:#fca5a5; }
.hint{
  margin-top:16px;
  text-align:center;
  color:#93c5fd;
  font-size:15px;
  line-height:1.6;
}
.done{
  text-align:center;
  padding:20px 6px 10px;
}
.done h2{
  margin:0 0 12px;
  font-size:38px;
  color:#ffffff;
}
.done p{
  margin:0 0 24px;
  font-size:20px;
  color:#cbd5e1;
  line-height:1.7;
}
.prompt-spell{
  color:#60a5fa;
}

@keyframes shake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
  100% { transform: translateX(0); }
}
.shake{
  animation: shake 0.3s;
  border-color: #ef4444 !important;
  box-shadow: 0 0 0 4px rgba(239,68,68,0.16);
}

@keyframes glow {
  0% { box-shadow: 0 0 0 rgba(34,197,94,0); }
  50% { box-shadow: 0 0 22px rgba(34,197,94,0.9); }
  100% { box-shadow: 0 0 0 rgba(34,197,94,0); }
}
.glow{
  animation: glow 0.5s;
  border-color:#22c55e !important;
}

@media (max-width:640px){
  .title{ font-size:28px; }
  .desc{ font-size:16px; }
  .answer{ font-size:22px; }
  .check-btn, .restart-btn, .play-btn{ font-size:17px; }
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div class="mini">
          <div class="badge" id="countBadge">1 / 20</div>
          <div class="stage">듣고 스펠링 쓰기</div>
        </div>
        <div class="progress">
          <div class="bar" id="bar"></div>
        </div>
      </div>

      <div class="content" id="app"></div>
    </div>
  </div>

<script>
const baseWords = [
  "bag","rag","tag","wag",
  "bad","mad","pad","lad",
  "ran","van",
  "sat","rat",
  "cab","jab",
  "gap","nap","sap",
  "ram","yam","gas"
];

let quizWords = [];
let currentIndex = 0;
let speakingLock = false;
let wrongCount = 0;
let answerShown = false;

const app = document.getElementById("app");
const countBadge = document.getElementById("countBadge");
const bar = document.getElementById("bar");

function shuffle(arr){
  const copied = [...arr];
  for(let i = copied.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [copied[i], copied[j]] = [copied[j], copied[i]];
  }
  return copied;
}

function normalizeText(text){
  return text
    .trim()
    .toLowerCase()
    .replace(/\s+/g, "")
    .replace(/[.,!?/\\\-_=+*"'`~:;()[\]{}<>]/g, "");
}

function updateHeader(){
  countBadge.textContent = `${currentIndex + 1} / ${quizWords.length}`;
  const progressValue = (currentIndex / quizWords.length) * 100;
  bar.style.width = `${Math.max(4, progressValue)}%`;
}

function getEnglishVoice(){
  const voices = speechSynthesis.getVoices();

  const preferredNames = [
    "Google US English",
    "Microsoft Jenny Online (Natural) - English (United States)",
    "Microsoft Aria Online (Natural) - English (United States)",
    "Samantha",
    "Alex"
  ];

  for (const name of preferredNames) {
    const found = voices.find(v => v.name === name);
    if (found) return found;
  }

  return (
    voices.find(v => /en-US/i.test(v.lang)) ||
    voices.find(v => /^en/i.test(v.lang)) ||
    voices.find(v => /English/i.test(v.name)) ||
    null
  );
}

function speakWord(word, buttonEl){
  if (speakingLock) return;
  speakingLock = true;

  if (buttonEl) buttonEl.disabled = true;

  speechSynthesis.cancel();

  const voice = getEnglishVoice();

  const first = new SpeechSynthesisUtterance(word);
  first.lang = "en-US";
  first.rate = 0.72;
  first.pitch = 1;
  if (voice) first.voice = voice;

  const second = new SpeechSynthesisUtterance(word);
  second.lang = "en-US";
  second.rate = 0.68;
  second.pitch = 1;
  if (voice) second.voice = voice;

  first.onend = () => {
    setTimeout(() => {
      speechSynthesis.speak(second);
    }, 180);
  };

  second.onend = () => {
    speakingLock = false;
    if (buttonEl) buttonEl.disabled = false;
  };

  first.onerror = second.onerror = () => {
    speakingLock = false;
    if (buttonEl) buttonEl.disabled = false;
  };

  setTimeout(() => {
    speechSynthesis.speak(first);
  }, 150);
}

function addShake(el){
  el.classList.remove("shake");
  void el.offsetWidth;
  el.classList.add("shake");
  setTimeout(() => el.classList.remove("shake"), 320);
}

function addGlow(el){
  el.classList.remove("glow");
  void el.offsetWidth;
  el.classList.add("glow");
  setTimeout(() => el.classList.remove("glow"), 520);
}

function blockInputCheats(input){
  ["paste","copy","cut","drop"].forEach(evt => {
    input.addEventListener(evt, e => e.preventDefault());
  });

  input.addEventListener("keydown", e => {
    const key = e.key.toLowerCase();
    if((e.ctrlKey || e.metaKey) && ["v","c","x","a"].includes(key)){
      e.preventDefault();
    }
  });
}

function renderQuiz(){
  updateHeader();

  app.innerHTML = `
    <h1 class="title">
      단어를 듣고<br>
      <span class="prompt-spell">영어 스펠링을 써 보세요</span>
    </h1>
    <p class="desc">플레이 버튼을 눌러 단어를 두 번 듣고 영어 철자를 입력하세요.</p>

    <div class="listen-box">
      <button class="play-btn" id="playBtn" type="button">▶ 플레이</button>
    </div>

    <div class="input-wrap">
      <label class="input-label prompt-spell" for="spellInput">영어 스펠링 입력</label>
      <input
        id="spellInput"
        class="answer"
        type="text"
        inputmode="latin"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="여기에 입력"
      />
    </div>

    <div class="btn-row">
      <button class="check-btn" id="checkBtn" type="button">확인</button>
      <button class="restart-btn" id="showAnswerBtn" type="button" style="display:none;">정답 보기</button>
    </div>

    <div class="msg" id="msg"></div>
    <div class="hint">문제는 랜덤 순서로 나옵니다. 자동완성, 복사, 붙여넣기는 막아 두었습니다.</div>
  `;

  const playBtn = document.getElementById("playBtn");
  const input = document.getElementById("spellInput");
  const checkBtn = document.getElementById("checkBtn");
  const showAnswerBtn = document.getElementById("showAnswerBtn");
  const msg = document.getElementById("msg");

  wrongCount = 0;
  answerShown = false;
  input.focus();
  blockInputCheats(input);

  playBtn.addEventListener("click", () => speakWord(quizWords[currentIndex], playBtn));

  input.addEventListener("keydown", (e) => {
    if(e.key === "Enter"){
      e.preventDefault();
      checkAnswer();
    }
  });

  checkBtn.addEventListener("click", checkAnswer);
  showAnswerBtn.addEventListener("click", () => {
    const correctWord = quizWords[currentIndex];
    input.value = correctWord;
    input.focus();
    input.select();
    answerShown = true;
    msg.textContent = `정답은 ${correctWord} 입니다. 보고 그대로 입력해 보세요.`;
    msg.className = "msg ok";
  });

  function checkAnswer(){
    const user = normalizeText(input.value);
    const correct = normalizeText(quizWords[currentIndex]);

    if(user === correct){
      addGlow(input);
      msg.textContent = answerShown
        ? "정답을 확인한 뒤 바르게 입력했습니다! 다음 단어로 이동합니다."
        : "정답입니다! 다음 단어로 이동합니다.";
      msg.className = "msg ok";

      setTimeout(() => {
        currentIndex++;
        if(currentIndex >= quizWords.length){
          renderDone();
        } else {
          renderQuiz();
        }
      }, 650);
    } else {
      wrongCount++;
      addShake(input);

      if(wrongCount >= 3){
        showAnswerBtn.style.display = "inline-block";
        msg.textContent = "오답입니다. 정답 보기 버튼을 눌러 확인할 수 있습니다.";
      } else {
        msg.textContent = `오답입니다. 다시 입력해 보세요. (${wrongCount}/3)`;
      }

      msg.className = "msg no";
      input.focus();
      input.select();
    }
  }
}

function renderDone(){
  bar.style.width = "100%";
  countBadge.textContent = "완료";

  app.innerHTML = `
    <div class="done">
      <h2>수고하셨습니다!</h2>
      <p>모든 단어의 스펠링 쓰기를 마쳤습니다.<br>다시 하려면 아래 버튼을 눌러 주세요.</p>
      <div class="btn-row">
        <button class="restart-btn" id="restartBtn" type="button">처음부터 다시 하기</button>
      </div>
    </div>
  `;

  document.getElementById("restartBtn").addEventListener("click", startQuiz);
}

function startQuiz(){
  quizWords = shuffle(baseWords);
  currentIndex = 0;
  renderQuiz();
}

document.addEventListener("contextmenu", e => e.preventDefault());
speechSynthesis.onvoiceschanged = () => {};

startQuiz();
</script>
</body>
</html>
