<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>sm sn ch sh 문장읽기카드</title>
<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#89f7fe,#66a6ff);padding:24px;}
.wrap{max-width:1100px;margin:auto;}
.header{background:white;padding:25px;border-radius:25px;text-align:center;margin-bottom:20px;box-shadow:0 12px 28px rgba(0,0,0,0.12);}
.title{font-size:2.2rem;font-weight:bold;color:#0f172a;}
.subtitle{margin-top:8px;font-size:1.05rem;color:#475569;line-height:1.6;}
.controls{margin-top:15px;}
button{padding:10px 18px;margin:5px;border-radius:12px;border:none;color:white;font-weight:bold;cursor:pointer;font-size:1rem;}
.stop{background:#2563eb;}
.all{background:#10b981;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:15px;}
.card{background:white;padding:20px;border-radius:18px;cursor:pointer;box-shadow:0 8px 18px rgba(0,0,0,0.10);transition:transform 0.12s ease,box-shadow 0.12s ease;}
.card:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(0,0,0,0.14);}
.num{color:#2563eb;font-weight:bold;margin-bottom:6px;}
.text{font-size:1.6rem;font-weight:bold;line-height:1.45;color:#0f172a;}
.words{font-size:0.92rem;color:#16a34a;font-weight:bold;margin-top:8px;}
.hint{font-size:0.9rem;color:#666;margin-top:8px;}
@media (max-width:700px){
  body{padding:16px;}
  .title{font-size:1.8rem;}
  .text{font-size:1.35rem;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="title">sm · sn · ch · sh 문장읽기카드</div>
    <div class="subtitle">small, smile, snake, snack, cherry, check, bench, lunch, ship, shop, fish, wash 단어들을 문장 속에서 읽어 보세요.</div>
    <div class="controls">
      <button class="stop" onclick="stopReading()">멈추기</button>
      <button class="all" onclick="readAll()">전체 읽기</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>
</div>
<script>
const sentences = [
  {text:"Small smile, big smile.", words:"small · smile"},
  {text:"A small snake has a snack.", words:"small · snake · snack"},
  {text:"The snake is by the shop.", words:"snake · shop"},
  {text:"I see a cherry on the bench.", words:"cherry · bench"},
  {text:"Check the snack on the bench.", words:"check · snack · bench"},

  {text:"The small fish is in the shop.", words:"small · fish · shop"},
  {text:"A big ship is on the sea.", words:"ship"},
  {text:"Wash your hands before lunch.", words:"wash · lunch"},
  {text:"We eat lunch on the bench.", words:"lunch · bench"},
  {text:"The cherry is small and red.", words:"cherry · small"},

  {text:"Check the ship, not the shop.", words:"check · ship · shop"},
  {text:"The fish is not on the bench.", words:"fish · bench"},
  {text:"A snack is not lunch.", words:"snack · lunch"},
  {text:"The snake is not a fish.", words:"snake · fish"},
  {text:"A shop is not a ship.", words:"shop · ship"},

  {text:"I smile when I eat a snack.", words:"smile · snack"},
  {text:"Please check the small box.", words:"check · small"},
  {text:"The fish is in a small dish.", words:"fish · small"},
  {text:"Wash the cherry, then eat it.", words:"wash · cherry"},
  {text:"The snake sits under the bench.", words:"snake · bench"},

  {text:"At lunch, I eat a cherry snack.", words:"lunch · cherry · snack"},
  {text:"A small ship goes past the shop.", words:"small · ship · shop"},
  {text:"Check the fish before lunch.", words:"check · fish · lunch"},
  {text:"The boy has a smile at the shop.", words:"smile · shop"},
  {text:"Wash, check, and pack the snack.", words:"wash · check · snack"}
];

let voice;
let allReadingTimeout = null;
let currentUtterance = null;

function loadVoices(){
  const v = window.speechSynthesis.getVoices();
  voice =
    v.find(x => x.lang === "en-US" && /Google|Microsoft|Samantha|Jenny|Aria|Guy|David/i.test(x.name))
    || v.find(x => x.lang === "en-US")
    || v.find(x => x.lang && x.lang.startsWith("en"))
    || v[0];
}

function speak(text){
  stopReading();
  currentUtterance = new SpeechSynthesisUtterance("\u200B, " + text);
  currentUtterance.lang = "en-US";
  currentUtterance.rate = 0.88;
  currentUtterance.pitch = 1;
  if(voice) currentUtterance.voice = voice;
  speechSynthesis.speak(currentUtterance);
}

function build(){
  const grid = document.getElementById("grid");
  grid.innerHTML = '';
  sentences.forEach((s,i)=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="num">${i+1}.</div>
      <div class="text">${s.text}</div>
      <div class="words">${s.words}</div>
      <div class="hint">클릭해서 듣기</div>
    `;
    card.onclick = ()=>speak(s.text);
    grid.appendChild(card);
  });
}

function stopReading(){
  speechSynthesis.cancel();
  if(allReadingTimeout){
    clearTimeout(allReadingTimeout);
    allReadingTimeout = null;
  }
}

function readAll(){
  stopReading();
  let i = 0;
  function next(){
    if(i >= sentences.length) return;
    currentUtterance = new SpeechSynthesisUtterance("\u200B, " + sentences[i].text);
    currentUtterance.lang = "en-US";
    currentUtterance.rate = 0.88;
    currentUtterance.pitch = 1;
    if(voice) currentUtterance.voice = voice;
    currentUtterance.onend = ()=>{
      i++;
      allReadingTimeout = setTimeout(next,500);
    };
    currentUtterance.onerror = ()=>{
      i++;
      allReadingTimeout = setTimeout(next,500);
    };
    speechSynthesis.speak(currentUtterance);
  }
  next();
}

window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();
build();
</script>
</body>
</html>
